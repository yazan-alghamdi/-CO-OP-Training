<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>سباق الدول حسب عدد الحجاج - موسم 1446هـ</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #fdfcfb;
      margin: 0;
      padding: 20px;
      direction: rtl;
      color: #333;
    }

    h1 {
      text-align: center;
      color: #7A5A23;
    }

    svg {
      width: 100%;
      height: 600px;
    }
  </style>
</head>
<body>
  <h1>سباق الدول حسب عدد الحجاج - موسم 1446هـ</h1>
  <svg></svg>

  <script>
    const svg = d3.select("svg");
    const width = 1000;
    const height = 600;
    const margin = {top: 50, right: 100, bottom: 50, left: 200};

    svg.attr("width", width).attr("height", height);

    const chartWidth = width - margin.left - margin.right;
    const chartHeight = height - margin.top - margin.bottom;

    const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

    const color = d3.scaleOrdinal(d3.schemeSet3);

    // استخدام الملف الجديد بالتاريخ الهجري
    d3.json("/static/bar_chart_race_data_hijri.json").then(data => {
      const dates = Object.keys(data).sort();
      const countries = Object.keys(data[dates[0]]);

      const x = d3.scaleLinear().range([0, chartWidth]);
      const y = d3.scaleBand().range([0, chartHeight]).padding(0.1);

      const dateText = g.append("text")
        .attr("x", chartWidth - 10)
        .attr("y", chartHeight + 40)
        .attr("text-anchor", "end")
        .attr("font-size", "24px")
        .attr("fill", "#7A5A23");

      let i = 0;
      function updateChart() {
        const currentDate = dates[i];
        const currentData = Object.entries(data[currentDate])
          .map(([country, value]) => ({country, value: +value}))
          .sort((a, b) => b.value - a.value)
          .slice(0, 10);

        x.domain([0, d3.max(currentData, d => d.value)]);
        y.domain(currentData.map(d => d.country));

        const bars = g.selectAll("rect").data(currentData, d => d.country);

        bars.enter().append("rect")
          .attr("y", d => y(d.country))
          .attr("height", y.bandwidth())
          .attr("x", 0)
          .attr("width", d => x(d.value))
          .attr("fill", d => color(d.country))
          .merge(bars)
          .transition().duration(500)
          .attr("y", d => y(d.country))
          .attr("width", d => x(d.value));

        bars.exit().remove();

        const labels = g.selectAll("text.label").data(currentData, d => d.country);

        labels.enter().append("text")
          .attr("class", "label")
          .attr("y", d => y(d.country) + y.bandwidth() / 2 + 5)
          .attr("x", d => x(d.value) + 5)
          .text(d => `${d.country}: ${d.value}`)
          .merge(labels)
          .transition().duration(500)
          .attr("y", d => y(d.country) + y.bandwidth() / 2 + 5)
          .attr("x", d => x(d.value) + 5)
          .text(d => `${d.country}: ${d.value}`);

        labels.exit().remove();

        // عرض التاريخ الهجري مباشرة من الملف الجديد
        dateText.text(currentDate + ' هـ');

        i = (i + 1) % dates.length;
      }

      updateChart();
      setInterval(updateChart, 1500);
    });
  </script>
</body>
</html>
